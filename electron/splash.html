<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #020617;
      color: #94a3b8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-user-select: none;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 22px;
      border-radius: 4px;
      border: 1px solid rgba(59, 130, 246, 0.3);
      background: rgba(30, 58, 138, 0.4);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #cbd5e1;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #e2e8f0;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #1e293b;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 12px;
      color: #475569;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-badge">RV</div>
    <div class="logo-name">Hour Counter</div>
  </div>
  <div class="spinner"></div>
  <div class="status" id="s">Starting…</div>
</body>
</html>
